# EU regional MCP runtime app (currently pinned to Frankfurt).
#
# This Fly app receives /mcp/<token> traffic for eu-region customers. The
# router's spawn-or-reuse logic (PR #2+) creates Fly machines on demand from
# this image with DATABASE_URL set to the customer's decrypted DSN. fly-replay
# session affinity (cache_key=<mcp-session-id>) is emitted by the OSS
# transport — Fly handles routing.
#
# Adding us in the V1 launch session is a copy of this file with primary_region
# = "iad" and app = "midplane-us". Same image, same env shape.

app = "midplane-eu"
primary_region = "fra"

[build]
  image = "midplane/midplane:0.6.0"

[env]
  PORT = "8080"
  DB_PATH = "/data/audit.db"
  # DATABASE_URL is injected per-machine by the router from the decrypted
  # customer DSN. NEVER bake a database URL into the image config.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
