name: publish-docker

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          # No attestation manifests in the index: buildx provenance/SBOM
          # add `unknown/unknown` manifests to the OCI index that Fly's image
          # resolver can't parse, making it fail to select linux/amd64 and
          # report "found arm64". Keep the index to just the platform images.
          provenance: false
          sbom: false
          push: true
          tags: |
            midplane/midplane:${{ steps.version.outputs.tag }}
            midplane/midplane:latest
