name: publish-npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - run: bun install

      - name: Publish @midplane/engine
        working-directory: packages/engine
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      # npm publish does not rewrite the workspace: protocol, so the published
      # mcp-server would otherwise ship `"@midplane/engine": "workspace:*"` and
      # fail to install for downstream consumers. Substitute the literal engine
      # version we just published before publishing mcp-server.
      - name: Pin @midplane/engine in mcp-server before publish
        run: |
          node -e "
            const fs = require('fs');
            const engineVersion = require('./packages/engine/package.json').version;
            const path = './packages/mcp-server/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            for (const dep of Object.keys(pkg.dependencies || {})) {
              if (pkg.dependencies[dep] === 'workspace:*') {
                pkg.dependencies[dep] = engineVersion;
              }
            }
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            console.log('rewrote workspace:* ->', engineVersion);
          "

      - name: Publish @midplane/mcp-server
        working-directory: packages/mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
