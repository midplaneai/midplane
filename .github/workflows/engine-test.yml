name: engine-test

# CI for the engine subtree (engine/). Runs only when engine files change, so a
# control-plane-only PR doesn't pay for it. The control-plane suite runs under
# vitest (see CONTRIBUTING.md); the engine runs under bun:test.

# Triggers include the repo-root build inputs because engine/docker/Dockerfile
# builds from the root: a bun.lock / root-manifest / bunfig change can break the
# compiled engine image without touching engine/**, so it must run docker-build.
on:
  push:
    branches: [main]
    paths:
      - "engine/**"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - "apps/web/package.json"
      - "packages/*/package.json"
      - "infra/*/package.json"
      - ".github/workflows/engine-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "engine/**"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - "apps/web/package.json"
      - "packages/*/package.json"
      - "infra/*/package.json"
      - ".github/workflows/engine-test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - run: bun install
      # Scope bun:test to engine/ — from the repo root `bun test` would discover
      # the control-plane vitest files (which import `vitest`, not `bun:test`).
      - name: engine bun:test
        run: cd engine && bun test

  smoketest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - run: bun install
      - name: Build and run smoketest
        working-directory: engine/examples/smoketest
        run: ./run.sh

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - run: bun install --frozen-lockfile
      - name: Build image and run MCP trial battery against sidecar Postgres
        # test-image.sh cd's into engine/ itself and builds from the repo root.
        run: bash engine/scripts/test-image.sh
