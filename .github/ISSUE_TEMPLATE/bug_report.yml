name: Bug report
description: Something in Midplane (control plane, engine, or self-host) is broken.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. **Do not** use this form for security
        vulnerabilities — report those privately (see SECURITY.md).
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Control plane (dashboard / MCP proxy)
        - Engine (SQL parsing / policy enforcement)
        - Self-host
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / image tag
      description: Engine image tag (e.g. midplane/midplane:0.10.0) or commit SHA, and whether self-hosted or cloud.
      placeholder: "midplane/midplane:0.10.0, self-host"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What you expected versus what actually occurred.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps. If a SQL shape slipped past a policy, include the exact query.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant logs. Redact secrets, credentials, and customer data.
      render: shell
    validations:
      required: false
