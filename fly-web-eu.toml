# EU control-plane Fly app for midplane-cloud.
#
# Serves eu.app.midplane.ai (regional EU subdomain) AND app.midplane.ai
# (apex — middleware renders /signup/region for unauth, 302s authed
# users to their regional subdomain). Talks ONLY to the EU Neon project
# (DATABASE_URL_EU); DATABASE_URL_US is intentionally unset so a stray
# getDb('us') call throws at the env-var read.
#
# Sibling fly-web-us.toml is the US control-plane app (midplane-web-us
# in iad). Both apps share the same image; they're distinguished by
# region-pinned secrets (MIDPLANE_REGION, DATABASE_URL_<REGION>,
# MIDPLANE_KMS_KEY_<REGION>). Auth is region-resident — each app has its own
# Better Auth tables in its regional DB, NOT a shared central instance.
#
# Why on Fly: FlyMachineSpawner returns IPv6 6PN private addresses that
# only same-org Fly apps can reach. Hosting the control plane elsewhere
# would force an extra public-Internet hop for every customer audit
# request.
#
# Deploy:
#   fly apps create midplane-web --org <org>
#   fly secrets set --app midplane-web ...   # see comment below
#   fly deploy --config fly-web-eu.toml
#
# Three host certs are needed on this app (Fly matches by SNI; each cert
# covers exactly one host). eu.app.midplane.ai is the dashboard + OAuth issuer
# (BETTER_AUTH_URL); app.midplane.ai is the apex picker; eu.midplane.ai is the
# MCP endpoint host (MIDPLANE_PUBLIC_HOST_EU) — agents connect there and the
# OAuth bearer is validated by THIS same app, so the cert is mandatory:
#   fly certs add eu.app.midplane.ai  --app midplane-web
#   fly certs add app.midplane.ai     --app midplane-web
#   fly certs add eu.midplane.ai      --app midplane-web   # MCP endpoint host
# See docs/runbooks/mcp-oauth-prod-hosts.md for the issuer-vs-endpoint topology.

app = "midplane-web"
primary_region = "fra"

[build]
  dockerfile = "apps/web/Dockerfile"

# Per-spec, [env] holds only non-secret process variables. Everything else
# (including the DATABASE_URL_EU + MIDPLANE_REGION region-pins,
# MIDPLANE_KMS_*, and MIDPLANE_OSS_IMAGE) goes through `fly secrets set`
# so we have one canonical place that audits configuration changes.
[env]
  NODE_ENV = "production"
  PORT = "3000"

# Secrets — set via `fly secrets set --app midplane-web KEY=VAL`. NEVER
# inline below. The deploy will fail-closed at boot for the indexer-token
# guard (see apps/web/test/mcp-proxy.test.ts) if INDEXER_TOKEN is missing.
# Cross-region secrets (DATABASE_URL_US, MIDPLANE_KMS_KEY_US, FLY_APP_US,
# FLY_REGION_US, MIDPLANE_KMS_DEV_KEY_US, MIDPLANE_PUBLIC_HOST_US) are
# DELIBERATELY UNSET on this app — env-var locality blocks accidental
# cross-region routing at the env-var read.
#
#   MIDPLANE_REGION="eu"                  # region pin — required
#   DATABASE_URL_EU                       # Neon prod project in eu-central-1
#   MIDDLEWARE_ENFORCE="false"            # "true" after 24h shadow window
#   BETTER_AUTH_URL="https://eu.app.midplane.ai"  # MCP OAuth issuer — this app's OWN origin (boot-asserted; serves /api/auth + /.well-known/*). See docs/runbooks/mcp-oauth-prod-hosts.md
#   BETTER_AUTH_SECRET                    # 32+ bytes (signs sessions); `openssl rand -base64 32`
#   MIDPLANE_REGION_COOKIE_SECRET         # 32+ bytes; MUST match across apex + both web apps (signed region cookie)
#   MIDPLANE_KMS_MODE                     # "env" or "kms"
#   MIDPLANE_KMS_DEV_KEY_EU               # env-mode only: 32-byte hex
#   MIDPLANE_KMS_KEY_EU                   # kms-mode only: CMK ARN/alias in eu-central-1
#   MIDPLANE_TOKEN_PEPPER_EU_V1           # env-mode only: base64 of 32 random bytes (HMAC key for mcp_tokens.token_hash)
#   MIDPLANE_TOKEN_PEPPER_CT_EU_V1        # kms-mode only: base64 CiphertextBlob from scripts/encrypt-token-pepper.sh
#   FLY_API_TOKEN                         # for FlyMachineSpawner
#   FLY_APP_EU="midplane-eu"
#   FLY_REGION_EU="fra"
#   MIDPLANE_PUBLIC_HOST_EU               # e.g. "eu.midplane.ai"
#   MIDPLANE_OSS_IMAGE                    # e.g. "midplane/midplane:0.12.0"
#   INDEXER_TOKEN                         # shared with regional containers
#   MIDPLANE_STAFF_USER_IDS               # comma-separated user IDs (staff allowlist)

[http_service]
  internal_port = 3000
  force_https = true
  # Always-on: the control plane terminates customer MCP traffic AND
  # serves the apex /signup/region picker. Cold starts on either would
  # surface as broken pages on first visit.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "15s"
  method = "GET"
  path = "/api/health"

# Next.js + Bun is hungrier than the OSS image (.next + traced node_modules
# in memory). 1024 MB gives headroom for build artifacts and a few
# concurrent SSR renders without OOM. Revisit when we have load data.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
