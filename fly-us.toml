# US regional MCP runtime app (pinned to Ashburn).
#
# This Fly app receives /mcp/<token> traffic for us-region customers. The
# router's spawn-or-reuse logic creates Fly machines on demand from this
# image with DATABASE_URL set to the customer's decrypted DSN. fly-replay
# session affinity (cache_key=<mcp-session-id>) is emitted by the OSS
# transport — Fly handles routing.
#
# Sibling fly-eu.toml is the EU runtime (midplane-eu in fra). Same image,
# same env shape; the two are distinguished only by app name and region.

app = "midplane-us"
primary_region = "iad"

[build]
  image = "midplane/midplane:0.6.0"

[env]
  PORT = "8080"
  DB_PATH = "/data/audit.db"
  # DATABASE_URL is injected per-machine by the router from the decrypted
  # customer DSN. NEVER bake a database URL into the image config.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

# NOTE: this [[vm]] only applies to `fly deploy`. The customer-serving
# machines are created on demand via the Machines API by FlyMachineSpawner,
# which pins its own guest (shared-cpu-1x / 256 MB). Keep this in sync with
# the `guest` block in packages/router/src/spawner-fly.ts.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
