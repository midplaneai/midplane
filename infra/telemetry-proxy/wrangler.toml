name = "midplane-telemetry-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-15"

# Bind t.midplane.ai as a Workers Custom Domain. Cloudflare provisions
# the cert and routes ALL paths to this Worker. Add the midplane.ai zone
# to the Cloudflare account before `wrangler deploy`.
#
# Rate limiting is configured at the Cloudflare zone (Security → WAF →
# Rate limiting rules), NOT in this Worker. Per-IP burst limits live at
# the edge so a misbehaving client never reaches Worker code.
routes = [
  { pattern = "t.midplane.ai", custom_domain = true }
]

[vars]
POSTHOG_HOST = "https://us.i.posthog.com"

# Secrets (set with `wrangler secret put <NAME>`):
#   POSTHOG_PROJECT_KEY  phc_… project key from PostHog → Project Settings.
