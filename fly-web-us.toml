# US control-plane Fly app for midplane-cloud.
#
# Serves us.app.midplane.ai. Talks ONLY to the US Neon project
# (DATABASE_URL_US); DATABASE_URL_EU is intentionally unset on this app
# so a stray getDb('eu') call throws at the env-var read (env-var
# locality = the cross-region-write guard).
#
# Sibling fly-web-eu.toml is the EU control-plane app (midplane-web in
# fra) and ALSO serves apex app.midplane.ai. Both apps share the same
# image; they're distinguished by region-pinned secrets. Auth is
# region-resident — each app has its own Better Auth tables in its
# regional DB, NOT a shared central instance.
#
# Deploy:
#   fly apps create midplane-web-us --org <org>
#   fly secrets set --app midplane-web-us ...   # see comment below
#   fly deploy --config fly-web-us.toml
#
# TLS (Fly matches by SNI; one cert per host). us.app.midplane.ai is the
# dashboard + OAuth issuer (BETTER_AUTH_URL); us.midplane.ai is the MCP endpoint
# host (MIDPLANE_PUBLIC_HOST_US) — agents connect there and the OAuth bearer is
# validated by THIS same app, so the cert is mandatory:
#   fly certs add us.app.midplane.ai --app midplane-web-us
#   fly certs add us.midplane.ai     --app midplane-web-us   # MCP endpoint host
# See docs/runbooks/mcp-oauth-prod-hosts.md for the issuer-vs-endpoint topology.

app = "midplane-web-us"
primary_region = "iad"

[build]
  dockerfile = "apps/web/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

# Secrets — `fly secrets set --app midplane-web-us KEY=VAL`. EU secrets
# are DELIBERATELY UNSET (env-var locality).
#
#   MIDPLANE_REGION="us"                  # region pin — required
#   DATABASE_URL_US                       # Neon prod project in us-east-2
#   MIDDLEWARE_ENFORCE="false"            # "true" after 24h shadow window
#   BETTER_AUTH_URL="https://us.app.midplane.ai"  # MCP OAuth issuer — this app's OWN origin (boot-asserted; serves /api/auth + /.well-known/*). See docs/runbooks/mcp-oauth-prod-hosts.md
#   BETTER_AUTH_SECRET                    # 32+ bytes (signs sessions); `openssl rand -base64 32`
#   MIDPLANE_REGION_COOKIE_SECRET         # 32+ bytes; MUST match across apex + both web apps (signed region cookie)
#   MIDPLANE_KMS_MODE                     # "env" or "kms"
#   MIDPLANE_KMS_DEV_KEY_US               # env-mode only: 32-byte hex
#   MIDPLANE_KMS_KEY_US                   # kms-mode only: CMK ARN/alias in us-east-2
#   MIDPLANE_TOKEN_PEPPER_US_V1           # env-mode only: base64 of 32 random bytes (HMAC key for mcp_tokens.token_hash)
#   MIDPLANE_TOKEN_PEPPER_CT_US_V1        # kms-mode only: base64 CiphertextBlob from scripts/encrypt-token-pepper.sh
#   FLY_API_TOKEN                         # for FlyMachineSpawner
#   FLY_APP_US="midplane-us"
#   FLY_REGION_US="iad"
#   MIDPLANE_PUBLIC_HOST_US               # e.g. "us.midplane.ai"
#   MIDPLANE_OSS_IMAGE                    # e.g. "midplane/midplane:0.10.0"
#   INDEXER_TOKEN                         # shared with regional containers
#   MIDPLANE_STAFF_USER_IDS               # comma-separated user IDs (staff allowlist)

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "15s"
  method = "GET"
  path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
