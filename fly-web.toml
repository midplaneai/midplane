# Control-plane Fly app for midplane-cloud.
#
# This is the public Next.js dashboard + auth + /mcp/<token> proxy. It is
# distinct from the regional MCP runtime apps (fly-eu.toml / a future
# fly-us.toml) which host customer OSS containers.
#
# Why on Fly: FlyMachineSpawner returns IPv6 6PN private addresses that
# only same-org Fly apps can reach. Hosting the control plane elsewhere
# would force an extra public-Internet hop for every customer audit
# request. See PR description for the Fly-vs-Vercel write-up.
#
# Deploy:
#   fly apps create midplane-web --org <org>
#   fly secrets set --app midplane-web ...   # see README + comment below
#   fly deploy --config fly-web.toml \
#     --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_...

app = "midplane-web"
primary_region = "fra"

[build]
  dockerfile = "apps/web/Dockerfile"

# Per-spec, [env] holds only non-secret process variables. Everything else
# (including FLY_APP_*, MIDPLANE_PUBLIC_HOST_*, MIDPLANE_KMS_MODE, and
# MIDPLANE_OSS_IMAGE) goes through `fly secrets set` so we have one
# canonical place that audits configuration changes.
[env]
  NODE_ENV = "production"
  PORT = "3000"

# Secrets — set via `fly secrets set --app midplane-web KEY=VAL`. NEVER
# inline below. The deploy will fail-closed at boot for the indexer-token
# guard (see apps/web/test/mcp-proxy.test.ts) if INDEXER_TOKEN is missing.
#
#   DATABASE_URL                          # Neon prod branch (eu-central-1)
#   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY     # also pass via --build-arg
#   CLERK_SECRET_KEY
#   MIDPLANE_KMS_MODE                     # "env" (AES-256-GCM with local key) or "kms" (AWS KMS envelope)
#   MIDPLANE_KMS_DEV_KEY_EU               # env-mode only: 32-byte hex (openssl rand -hex 32)
#   MIDPLANE_KMS_DEV_KEY_US               # env-mode only: 32-byte hex
#   MIDPLANE_KMS_KEY_EU                   # kms-mode only: CMK ARN or alias in eu-central-1
#                                         #   e.g. arn:aws:kms:eu-central-1:<acct>:key/<uuid>
#                                         #   or alias/midplane-prod-eu
#   MIDPLANE_KMS_KEY_US                   # kms-mode only: CMK ARN or alias in us-east-2
#   FLY_API_TOKEN                         # for FlyMachineSpawner
#   FLY_APP_EU                            # "midplane-eu"
#   FLY_APP_US                            # "midplane-us"
#   FLY_REGION_EU                         # Fly DC code, e.g. "fra"
#   FLY_REGION_US                         # Fly DC code, e.g. "iad"
#   MIDPLANE_PUBLIC_HOST_EU               # e.g. "eu.midplane.ai"
#   MIDPLANE_PUBLIC_HOST_US               # e.g. "us.midplane.ai"
#   MIDPLANE_OSS_IMAGE                    # e.g. "midplane/midplane:0.5.0"
#   INDEXER_TOKEN                         # shared with regional containers

[http_service]
  internal_port = 3000
  force_https = true
  # Always-on: the control plane terminates customer MCP traffic. Cold
  # starts on /mcp/<token> would burn the OSS spawn budget waiting for
  # the proxy itself to wake.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "15s"
  method = "GET"
  path = "/api/health"

# Next.js + Bun is hungrier than the OSS image (.next + traced node_modules
# in memory). 1024 MB gives headroom for build artifacts and a few
# concurrent SSR renders without OOM. Revisit when we have load data.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
